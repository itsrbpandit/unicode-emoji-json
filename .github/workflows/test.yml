name: Node CI

on:
  push:
  pull_request:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: latest
    - name: npm install, build, and test
      run: |
        npm ci
        npm test
      env:
        CI: true
